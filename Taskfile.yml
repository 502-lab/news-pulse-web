version: '3'

# ─────────────────────────────────────────
# News Curator AI — Frontend Taskfile
# ─────────────────────────────────────────

tasks:

  # ───── 공통 (모든 레포 동일) ─────

  spec:update:
    desc: "spec 서브모듈 최신화"
    cmd: git submodule update --remote specs

  spec:validate:
    desc: "openapi.yaml 유효성 검사"
    cmd: npx @stoplight/spectral-cli lint specs/api-contract/openapi.yaml

  claude:check:
    desc: "CLAUDE.md 존재 여부 확인"
    cmd: find . -name "CLAUDE.md" | sort

  # ───── Frontend 전용 ─────

  api:gen:
    desc: "openapi → TypeScript 타입 자동생성"
    deps: [spec:update]
    cmd: npx openapi-typescript specs/api-contract/openapi.yaml -o generated/api-types.ts

  dev:
    desc: "개발 서버 시작 (로컬)"
    cmd: next dev

  build:
    desc: "프로덕션 빌드"
    cmd: next build

  lint:
    desc: "ESLint 검사"
    cmd: npx eslint src/

  lint:fix:
    desc: "ESLint 자동 수정"
    cmd: npx eslint src/ --fix

  type:check:
    desc: "TypeScript 타입 검사"
    cmd: npx tsc --noEmit

  test:
    desc: "테스트 실행"
    cmd: npx jest

  test:watch:
    desc: "테스트 watch 모드"
    cmd: npx jest --watch

  # ───── 자주 쓰는 조합 ─────

  check:
    desc: "타입 + 린트 전체 검사 (커밋 전 권장)"
    deps: [type:check, lint]

  ready:
    desc: "spec 최신화 + 타입 생성 + 전체 검사 (개발 시작 전 권장)"
    cmds:
      - task: api:gen
      - task: check
