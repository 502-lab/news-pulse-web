<!DOCTYPE html>
<html lang="ko">
<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --text-dim: #484f58;
      --accent: #58a6ff;
      --add: #3fb950;
      --mod: #d29922;
      --del: #f85149;
      --chore: #8957e5;
      --ci: #1f6feb;
      --feat: #3fb950;
      --fix: #f85149;
      --refactor: #d29922;
      --docs: #58a6ff;
      --radius: 6px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .repo-badge {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      font-weight: 600;
    }
    .branch-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .branch-badge svg { width: 12px; height: 12px; fill: currentColor; }
    .commit-count {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
    }
    .commit-count span { color: var(--text); font-weight: 600; }

    /* ── Filter bar ── */
    .filter-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .filter-bar label { font-size: 12px; color: var(--text-muted); margin-right: 4px; }
    .tag-filter {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .tag-btn {
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--mono);
    }
    .tag-btn:hover { border-color: var(--accent); color: var(--text); }
    .tag-btn.active { color: #fff; border-color: transparent; }
    .tag-btn[data-type="all"].active { background: var(--surface2); color: var(--text); border-color: var(--border); }
    .tag-btn[data-type="chore"].active { background: var(--chore); }
    .tag-btn[data-type="ci"].active { background: var(--ci); }
    .tag-btn[data-type="feat"].active { background: var(--feat); }
    .tag-btn[data-type="fix"].active { background: var(--fix); }
    .tag-btn[data-type="refactor"].active { background: var(--refactor); }
    .tag-btn[data-type="docs"].active { background: var(--docs); }

    .search-input {
      margin-left: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text);
      width: 200px;
      font-family: var(--font);
    }
    .search-input:focus { outline: none; border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-dim); }

    /* ── Main layout ── */
    main {
      display: grid;
      grid-template-columns: 340px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* ── Commit list ── */
    .commit-list {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 8px 0;
    }
    .commit-list::-webkit-scrollbar { width: 4px; }
    .commit-list::-webkit-scrollbar-track { background: transparent; }
    .commit-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .commit-item {
      padding: 10px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s;
      position: relative;
    }
    .commit-item:hover { background: var(--surface2); }
    .commit-item.active {
      background: var(--surface2);
      border-left-color: var(--accent);
    }
    .commit-item.hidden { display: none; }

    .commit-top {
      display: flex;

    .commit-type {

    .type-refactor { background: rgba(210,153,34,0.2); color: #e3b341; }
    .type-docs { background: rgba(88,166,255,0.2); color: #79b8ff; }
    .type-other { background: rgba(139,148,158,0.2); color: #8b949e; }

    .commit-hash {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .commit-date {
      font-size: 11px;
      color: var(--text-dim);
      margin-left: auto;
      flex-shrink: 0;
    }
    .commit-subject {
      font-size: 12px;
      color: var(--text);
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;

    .commit-meta {

    .commit-author {

      color: var(--text-dim);

    .file-pill {

    /* ── Detail panel ── */

    }
    .detail-panel::-webkit-scrollbar { width: 4px; }
    .detail-panel::-webkit-scrollbar-track { background: transparent; }
    .detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .detail-header {

    }
    .detail-title {

    /* ── Stats bar ── */
    .stats-row {

    .stat-badge {

    /* ── File groups ── */
    .file-group {

    .file-list {
      display: flex;
      flex-direction: column;
      gap: 2px;

    .file-item {

      align-items: center;
      gap: 10px;

    .file-status {

      align-items: center;

    /* ── Reasoning block ── */
    .reasoning-section {
      margin-bottom: 20px;
      border: 1px solid rgba(88,166,255,0.2);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .reasoning-header {
      background: rgba(88,166,255,0.07);
      border-bottom: 1px solid rgba(88,166,255,0.15);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .reasoning-header:hover { background: rgba(88,166,255,0.12); }
    .reasoning-icon {
      width: 16px; height: 16px;
      background: rgba(88,166,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      color: var(--accent);
      font-weight: 800;
      flex-shrink: 0;
    }
    .reasoning-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .reasoning-chevron {
      margin-left: auto;

      font-size: 10px;
      transition: transform 0.2s;
    }
    .reasoning-section.collapsed .reasoning-chevron { transform: rotate(-90deg); }
    .reasoning-body {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .reasoning-section.collapsed .reasoning-body { display: none; }
    .reasoning-point {
      display: flex;
      gap: 10px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
    }
    .reasoning-point-num {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(88,166,255,0.15);
      color: var(--accent);
      font-size: 10px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      margin-top: 2px;
    }
    .reasoning-point-text { flex: 1; }
    .reasoning-point-text strong { color: var(--accent); }
    .reasoning-point-text code {
      font-family: var(--mono);
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      color: #e3b341;
    }

    /* ── Diff view ── */
    .diff-section {
      margin-top: 20px;
    }
    .diff-section-title {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .diff-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Timeline connector ── */
    .timeline-connector {
      position: absolute;
      left: 22px;
      top: 0;
      bottom: -1px;
      width: 1px;
      background: var(--border);
    }
    .commit-item:last-child .timeline-connector { display: none; }
    .timeline-dot {
      position: absolute;
      left: 18px;
      top: 14px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--border);
      border: 2px solid var(--bg);
    }
    .commit-item.active .timeline-dot { background: var(--accent); }

    .pl-timeline {
      padding-left: 36px;
    }
  </style>
</head>

<script>
const COMMITS = [
  {
    hash: "3df922b0a162df1a1851c60bbcaea2046988add5",
    short: "3df922b",
    author: "이재인",
    date: "2026-06-10 23:57",
    subject: "feat: 001 디자인 토큰 & 공유 UI 컴포넌트 시스템 구현",
    body: "Tailwind CSS v4(@tailwindcss/vite) + lucide-react 설치 및 디자인 토큰, 공유 UI 컴포넌트 10종 구현. Co-Authored-By: Claude Sonnet 4.6",
    stats: "31 files changed, 3327 insertions(+), 278 deletions(-)",
    reasoning: [
      {
        title: "Tailwind CSS v4를 선택한 이유",
        text: "프로젝트에 Tailwind가 미설치 상태였고, pnpm이 최신 버전인 <code>tailwindcss@4.3.0</code>을 설치했다. v4는 <code>tailwind.config.js</code> 대신 CSS 파일의 <code>@theme {}</code> 블록으로 토큰을 관리하는 방식으로 변경됐다. <code>@tailwindcss/vite</code> 플러그인을 vite.config.ts에 추가해 Vite와 통합했고, 기존 spec이 v3 기준으로 작성된 부분(<code>theme.extend</code>)은 v4 CSS 변수 방식으로 자동 대응됐다. <code>--color-brand</code>, <code>--radius-card</code> 등 CSS 커스텀 프로퍼티가 <code>bg-brand</code>, <code>rounded-card</code> 유틸리티 클래스로 그대로 컴파일된다."
      },
      {
        title: "카테고리 색상에만 inline style 허용",
        text: "Constitution은 inline style 사용을 금지하지만, <code>CatBadge</code>와 <code>BiasChip</code>에는 예외를 적용했다. 카테고리 문자열(<code>기술</code>, <code>경제</code> 등)은 API에서 런타임에 내려오는 동적 값이므로 Tailwind JIT가 빌드 타임에 클래스를 생성할 수 없다. <code>bg-[#EEF0FF]</code> 같은 임의값 클래스는 <em>동적 string interpolation</em>으로는 생성되지 않는다. 따라서 <code>CAT_COLOR</code> 레코드를 <code>src/constants/categories.ts</code>에 정의하고 <code>style={{ color: fg, background: bg }}</code>로 직접 주입하는 것이 유일한 실용적 해법이다. 이 결정은 spec의 Assumptions 섹션에 명시적으로 문서화해 근거를 남겼다."
      },
      {
        title: "Icon 컴포넌트 — lucide-react + 커스텀 SVG 혼합 전략",
        text: "lucide-react는 41개 아이콘을 커버하지만 <code>arrowleft</code>, <code>chevright</code>, <code>spark2</code> 3개는 lucide에 없는 커스텀 path다. <strong>전체 SVG 커스텀 테이블</strong>로 만들면 lucide 업데이트 혜택 없이 유지비용만 높아지고, <strong>lucide-react만 사용</strong>하면 커스텀 아이콘을 추가할 수 없다. 두 방식을 결합해 <code>LUCIDE_MAP</code> + <code>CUSTOM_ICONS</code> 두 테이블을 순서대로 조회하는 방식으로 통합했다. 알 수 없는 name은 <code>&lt;span /&gt;</code>을 반환해 미래 아이콘 추가 시 화면이 깨지지 않도록 했다."
      },
      {
        title: "Tailwind v4 경고 — lightningcss @theme 미인식",
        text: "빌드 시 <code>[lightningcss minify] Unknown at rule: @theme</code> 경고가 출력된다. lightningcss(Vite의 CSS 미니파이어)가 Tailwind v4의 <code>@theme</code> 디렉티브를 모르기 때문이다. Tailwind가 CSS를 처리한 <em>이후</em> lightningcss가 미니파이를 하는 순서라 실제 출력 CSS에는 문제없다. 빌드는 성공하고 모든 토큰이 정상 컴파일된다. Tailwind v4 + lightningcss 조합의 알려진 경고로, 무시해도 무방하다."
      }
    ],
    files: [
      { s: "A", p: ".specify/feature.json" },

/* ── Helpers ── */
function getType(subject) {
  const m = subject.match(/^(\w+)(\(.+\))?:/);
  return m ? m[1].toLowerCase() : 'other';
}

function splitPath(p) {
  const idx = p.lastIndexOf('/');
  if (idx === -1) return { dir: '', name: p };
  return { dir: p.slice(0, idx + 1), name: p.slice(idx + 1) };
}

function getExt(name) {
  const idx = name.lastIndexOf('.');
  return idx > 0 ? name.slice(idx + 1) : '';
}

function groupFiles(files) {
  const groups = { A: [], M: [], D: [] };
  files.forEach(f => {
    if (groups[f.s]) groups[f.s].push(f);
    else groups.D.push(f);
  });
  return groups;
}

function renderFileItem(f) {
  const { dir, name } = splitPath(f.p);
  const ext = getExt(name);
  return `
    <div class="file-item">
      <span class="file-status status-${f.s}">${f.s}</span>
      <span class="file-path">
        <span class="file-dir">${dir}</span><span class="file-name">${name}</span>
      </span>
      ${ext ? `<span class="file-ext">${ext}</span>` : ''}
    </div>`;
}

function renderReasoning(reasoning) {
  if (!reasoning || reasoning.length === 0) return '';
  const points = reasoning.map((r, i) => `
    <div class="reasoning-point">
      <span class="reasoning-point-num">${i + 1}</span>
      <div class="reasoning-point-text"><strong>${escHtml(r.title)}</strong><br/>${r.text}</div>
    </div>`).join('');
  return `
    <div class="reasoning-section" id="reasoning-block">
      <div class="reasoning-header" onclick="toggleReasoning()">
        <span class="reasoning-icon">?</span>
        <span class="reasoning-label">Claude의 판단 근거</span>
        <span class="reasoning-chevron">▼</span>
      </div>
      <div class="reasoning-body">${points}</div>
    </div>`;
}

function renderDetail(c) {
  const type = getType(c.subject);
  const subject = c.subject.replace(/^\w+(\(.+\))?:\s*/, '');
  const groups = groupFiles(c.files);
  const addCount = groups.A.length;
  const modCount = groups.M.length;
  const delCount = groups.D.length;
  const totalFiles = c.files.length;

  let filesHtml = '';
  if (addCount > 0) {
    filesHtml += `
      <div class="file-group">
        <div class="file-group-header">추가됨 — ${addCount}개</div>
        <div class="file-list">${groups.A.map(renderFileItem).join('')}</div>
      </div>`;
  }
  if (modCount > 0) {
    filesHtml += `
      <div class="file-group">
        <div class="file-group-header">수정됨 — ${modCount}개</div>
        <div class="file-list">${groups.M.map(renderFileItem).join('')}</div>
      </div>`;
  }
  if (delCount > 0) {
    filesHtml += `
      <div class="file-group">
        <div class="file-group-header">삭제됨 — ${delCount}개</div>
        <div class="file-list">${groups.D.map(renderFileItem).join('')}</div>
      </div>`;
  }
  if (totalFiles === 0) {
    filesHtml = '<p style="color:var(--text-muted);font-size:13px;">파일 변경 없음 (초기 커밋)</p>';
  }

  const bodyHtml = c.body
    ? `<div class="detail-body">${escHtml(c.body)}</div>`
    : '';

  return `
    <div class="detail-header">
      <div class="detail-title">${escHtml(c.subject)}</div>
      <div class="detail-meta-row">
        <span><strong>Author</strong> ${escHtml(c.author)}</span>
        <span><strong>Date</strong> ${c.date}</span>
        <span class="hash-full">${c.short}</span>
      </div>
      ${bodyHtml}
    </div>
    ${renderReasoning(c.reasoning)}
    <div class="stats-row">
      <span class="stat-badge total"><span class="stat-num">${totalFiles}</span> files</span>
      ${addCount > 0 ? `<span class="stat-badge adds">+${addCount} added</span>` : ''}
      ${modCount > 0 ? `<span class="stat-badge mods">~${modCount} modified</span>` : ''}
      ${delCount > 0 ? `<span class="stat-badge dels">-${delCount} deleted</span>` : ''}
      ${c.stats ? `<span style="font-size:11px;color:var(--text-dim);margin-left:auto;">${escHtml(c.stats)}</span>` : ''}
    </div>
    ${filesHtml}
  `;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Render list ── */
const listEl = document.getElementById('commitList');
const detailEl = document.getElementById('detailPanel');
const searchEl = document.getElementById('searchInput');
const countEl = document.getElementById('visibleCount');

let activeHash = null;
let activeType = 'all';
let searchQ = '';

function renderList() {
  listEl.innerHTML = '';
  let visible = 0;

  COMMITS.forEach((c, i) => {
    const type = getType(c.subject);
    const matchType = activeType === 'all' || type === activeType;
    const matchSearch = !searchQ || c.subject.toLowerCase().includes(searchQ) || c.short.includes(searchQ);
    const hidden = !matchType || !matchSearch;

    if (!hidden) visible++;

    const groups = groupFiles(c.files);
    const addC = groups.A.length;
    const modC = groups.M.length;
    const delC = groups.D.length;

    const pillHtml = `
      <div class="file-pill">
        ${addC > 0 ? `<span class="pill-add">+${addC}</span>` : ''}
        ${modC > 0 ? `<span class="pill-mod">~${modC}</span>` : ''}
        ${delC > 0 ? `<span class="pill-del">-${delC}</span>` : ''}
      </div>`;

    const typeClass = `type-${['chore','ci','feat','fix','refactor','docs'].includes(type) ? type : 'other'}`;
    const isActive = c.hash === activeHash;

    const el = document.createElement('div');
    el.className = `commit-item pl-timeline${isActive ? ' active' : ''}${hidden ? ' hidden' : ''}`;
    el.dataset.hash = c.hash;
    el.innerHTML = `
      <div class="timeline-connector"></div>
      <div class="timeline-dot"></div>
      <div class="commit-top">
        <span class="commit-type ${typeClass}">${type}</span>
        <span class="commit-hash">${c.short}</span>
        <span class="commit-date">${c.date.split(' ')[0]}</span>
      </div>
      <div class="commit-subject">${escHtml(c.subject.replace(/^\w+(\(.+\))?:\s*/, ''))}</div>
      <div class="commit-meta">
        <span class="commit-author">${escHtml(c.author)}</span>
        ${pillHtml}
      </div>
    `;
    el.addEventListener('click', () => selectCommit(c.hash));
    listEl.appendChild(el);
  });

  // no results
  if (visible === 0) {
    const nr = document.createElement('div');
    nr.className = 'no-results';
    nr.textContent = '검색 결과 없음';
    listEl.appendChild(nr);
  }

  countEl.textContent = visible;
}

function selectCommit(hash) {
  activeHash = hash;
  // update active class
  document.querySelectorAll('.commit-item').forEach(el => {
    el.classList.toggle('active', el.dataset.hash === hash);
  });

  const c = COMMITS.find(x => x.hash === hash);
  if (c) {
    detailEl.innerHTML = renderDetail(c);
    detailEl.scrollTop = 0;
  }
}

/* ── Filters ── */
document.getElementById('typeFilter').addEventListener('click', e => {
  const btn = e.target.closest('[data-type]');
  if (!btn) return;
  activeType = btn.dataset.type;
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.toggle('active', b === btn));
  renderList();
});

searchEl.addEventListener('input', e => {
  searchQ = e.target.value.trim().toLowerCase();
  renderList();
});

/* ── Reasoning toggle ── */
function toggleReasoning() {
  const block = document.getElementById('reasoning-block');
  if (block) block.classList.toggle('collapsed');
}

/* ── Init ── */
renderList();
// auto-select first
if (COMMITS.length > 0) selectCommit(COMMITS[0].hash);
countEl.textContent = COMMITS.length;
</script>
